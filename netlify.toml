[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Clean URLs without .html extension
[[redirects]]
  from = "/experience"
  to = "/experience.html"
  status = 301

[[redirects]]
  from = "/ventures"
  to = "/ventures.html"
  status = 301

[[redirects]]
  from = "/publications"
  to = "/publications.html"
  status = 301
